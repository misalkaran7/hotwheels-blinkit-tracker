name: HotWheels Blinkit Tracker Cron

on:
  schedule:
    # Runs automatically every 10 minutes (UTC time)
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows you to manually trigger a run using a button on GitHub

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/python-version@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium

    - name: Execute Stock Check Script
      env:
        # Securely inject your hidden credentials into the environment variables
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python tracker.py